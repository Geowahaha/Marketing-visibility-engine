services:
  visibility-engine-api:
    build: .
    container_name: visibility-engine-api
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - VISIBILITY_ENGINE_DATA_DIR=/data
    ports:
      - "8090:8090"
    volumes:
      - visibility_engine_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
volumes:
  visibility_engine_data:
