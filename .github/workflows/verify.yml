name: verify

# AI Mark production gate. Runs the same checks as `npm run verify:local`:
# syntax (scan/system-health/bridges/index.html), API smoke, bridge e2e,
# Python audits (pytest), and npm audit. Does NOT hit the live site
# (--skip-production), so it never depends on prod or secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Python package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run AI Mark verification gate (local, skip production smoke)
        working-directory: web
        run: npm run verify:local
